name: 'Kustomize File Validator'
description: 'Validates that all kustomization.yaml files correctly reference actual files in their directories'
author: 'm477r1x'
branding:
  icon: 'check-circle'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - name: Install yq
      shell: bash
      run: |
        wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
        chmod +x /usr/local/bin/yq

    - name: Validate Kustomization Files
      shell: bash
      run: |
        #!/bin/bash
        set -e
        FAILED=0
        ERROR_LOG=$(mktemp)

        # First, check for directories with YAML files but no kustomization.yaml
        echo "Checking for missing kustomization.yaml files..."
        checked_dirs=()
        while IFS= read -r yaml_file; do
          dir=$(dirname "$yaml_file")
          
          # Skip if we've already checked this directory
          if [[ " ${checked_dirs[@]} " =~ " ${dir} " ]]; then
            continue
          fi
          checked_dirs+=("$dir")
          
          if [ ! -f "$dir/kustomization.yaml" ]; then
            echo "❌ Error: Directory $dir contains YAML files but is missing kustomization.yaml" | tee -a "$ERROR_LOG"
            FAILED=1
          fi
        done < <(find . -type f \( -name "*.yaml" -o -name "*.yml" \) ! -name "kustomization.yaml" ! -path "*/.*")

        # Then validate all existing kustomization.yaml files
        echo "Validating kustomization.yaml files..."
        while read kustfile; do
          dir=$(dirname "$kustfile")
          DIR_FAILED=0

          # Get declared resources
          declared_resources=$(yq e '.resources[]' "$kustfile" 2>/dev/null || echo "")

          # Check if each actual file is in kustomization.yaml
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            
            # Skip files marked with #!kustomize-validate ignore
            if grep -q "#!kustomize-validate ignore" "$dir/$file" 2>/dev/null; then
              echo "⏭️🙈 Ignoring $file (marked with #!kustomize-validate ignore)"
              continue
            fi
            
            if ! echo "$declared_resources" | grep -Fxq "$file"; then
              echo "❌ Error: $file not listed in $kustfile" | tee -a "$ERROR_LOG"
              DIR_FAILED=1
              FAILED=1
            fi
          done < <(find "$dir" -maxdepth 1 -type f ! -name "kustomization.yaml" ! -name ".*" -exec basename {} \;)

          # Check if declared resources actually exist
          while IFS= read -r resource; do
            [ -z "$resource" ] && continue
            resource_path="$dir/$resource"
            if [ ! -e "$resource_path" ]; then
              echo "❌ Error: declared resource '$resource' not found in $dir" | tee -a "$ERROR_LOG"
              DIR_FAILED=1
              FAILED=1
            fi
          done < <(echo "$declared_resources")

          # Print status for this directory
          if [ $DIR_FAILED -eq 0 ]; then
            echo "✅ $dir/kustomization.yaml validated successfully"
          fi
        done < <(find . -type f -name "kustomization.yaml")

        rm -f "$ERROR_LOG"

        if [ $FAILED -eq 1 ]; then
          exit 1
        fi
        echo "✅ All kustomization files validated successfully"

name: 'Kustomize Check'
description: 'Check if kustomization.yaml exists and contains all items in the directory'
inputs:
  directory:
    description: 'Directory to check'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Check kustomization.yaml
      shell: bash
      run: |
        if [ ! -f "${{ inputs.directory }}/kustomization.yaml" ]; then
          echo "kustomization.yaml not found in ${{ inputs.directory }}"
          exit 1
        fi

        items=$(ls -1 "${{ inputs.directory }}" | grep -v "kustomization.yaml")
        missing_items=""

        for item in $items; do
          if ! grep -q "$item" "${{ inputs.directory }}/kustomization.yaml"; then
            missing_items+="$item "
          fi
        done

        if [ -n "$missing_items" ]; then
          echo "The following items are missing from kustomization.yaml in ${{ inputs.directory }}: $missing_items"
          exit 1
        fi

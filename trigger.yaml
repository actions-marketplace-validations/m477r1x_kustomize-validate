name: Kustomize Check

on:
  pull_request:

jobs:
  check_kustomization:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Get changed directories
      id: changed-dirs
      run: |
        changed_dirs=$(git diff --name-only HEAD^1 HEAD | xargs -I {} dirname {} | sort -u)
        echo "::set-output name=dirs::$changed_dirs"

    - name: Check kustomization.yaml in changed directories
      uses: ./.github/actions/kustomize-check
      with:
        directory: ${{ steps.changed-dirs.outputs.dirs }}

    - name: Recursively check subdirectories
      shell: bash
      run: |
        for dir in ${{ steps.changed-dirs.outputs.dirs }}; do
          for subdir in $(find "$dir" -type d); do
            ./.github/actions/kustomize-check "$subdir"
          done
        done
